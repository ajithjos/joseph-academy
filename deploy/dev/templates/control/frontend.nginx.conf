server {
  listen 80;
  server_name _;

  root /srv/cornerstone/frontend;
  index index.html;

  resolver 127.0.0.11 ipv6=off;
  set $control_plane_upstream http://control-plane:8788;

  location = /content {
    return 301 /content/;
  }

  location = /content/index.html {
    root /srv/cornerstone;
  }

  location /content/ {
    root /srv/cornerstone;
    try_files $uri $uri/index.html /content/index.html;
  }

  location /api/ {
    proxy_pass $control_plane_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass $control_plane_upstream/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}