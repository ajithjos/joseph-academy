name: ${CORNERSTONE_DEV_COMPOSE_PROJECT_NAME}

services:
  postgres:
    image: ${CORNERSTONE_POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${CORNERSTONE_POSTGRES_DB}
      POSTGRES_USER: ${CORNERSTONE_POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${CORNERSTONE_POSTGRES_ADMIN_PASSWORD}
      CORNERSTONE_POSTGRES_APP_USER: ${CORNERSTONE_POSTGRES_APP_USER}
      CORNERSTONE_POSTGRES_APP_PASSWORD: ${CORNERSTONE_POSTGRES_APP_PASSWORD}
    ports:
      - "${CORNERSTONE_POSTGRES_PORT}:5432"
    volumes:
      - ${CORNERSTONE_POSTGRES_DATA_HOST}:/var/lib/postgresql/data
      - ../../dev/templates/postgres-init:/docker-entrypoint-initdb.d:ro

  control-plane:
    build:
      context: ../../..
      dockerfile: deploy/dev/Dockerfile.control_plane
      args:
        RUST_IMAGE: ${CORNERSTONE_RUST_IMAGE}
        RUNTIME_IMAGE: ${CORNERSTONE_RUNTIME_IMAGE}
    depends_on:
      - postgres
    environment:
      CORNERSTONE_BIND_ADDRESS: 0.0.0.0:${CORNERSTONE_CONTROL_PLANE_PORT}
      CORNERSTONE_DATABASE_URL: ${CORNERSTONE_DATABASE_URL}
      CORNERSTONE_CONTENT_ROOT: /workspace/content
      CORNERSTONE_BOOTSTRAP_FILE: /workspace/deploy/config/runtime_defaults/identity_bootstrap.yaml
      CORNERSTONE_ARTIFACTS_ROOT: /data/artifacts
      CORNERSTONE_EXPORTS_ROOT: /data/exports
      CORNERSTONE_AUTO_BOOTSTRAP: "true"
      CORNERSTONE_FRONTEND_PUBLIC_URL: http://127.0.0.1:${CORNERSTONE_FRONTEND_PORT}
      CORNERSTONE_CONTENT_PUBLIC_URL: http://127.0.0.1:${CORNERSTONE_FRONTEND_PORT}/content/
    ports:
      - "${CORNERSTONE_CONTROL_PLANE_PORT}:${CORNERSTONE_CONTROL_PLANE_PORT}"
    volumes:
      - ${CORNERSTONE_WORKSPACE_HOST}:/workspace:ro
      - ${CORNERSTONE_ARTIFACTS_HOST}:/data/artifacts:rw
      - ${CORNERSTONE_EXPORTS_HOST}:/data/exports:rw

  frontend:
    image: ${CORNERSTONE_NGINX_IMAGE}
    ports:
      - "${CORNERSTONE_FRONTEND_PORT}:80"
    volumes:
      - ${CORNERSTONE_FRONTEND_BUILD_HOST}:/srv/cornerstone/frontend:ro
      - ${CORNERSTONE_DOCS_BUILD_HOST}:/srv/cornerstone/content:ro
      - ../../dev/templates/control/frontend.nginx.conf:/etc/nginx/conf.d/default.conf:ro
