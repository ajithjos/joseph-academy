skills:
  - skill_id: number_bonds_to_20
    subject_id: maths
    area_id: arithmetic
    title: Number bonds to 20
    recommended_age: 8
    recommended_level: Year 3
    description: Recall pairs and simple missing-number relationships within 20 without slow counting.
    success_criteria: Answers 12 bond and missing-number prompts accurately in under 2 minutes.
  - skill_id: add_two_digit_numbers_with_bridging
    subject_id: maths
    area_id: arithmetic
    title: Add two-digit numbers with bridging
    recommended_age: 8
    recommended_level: Year 3
    description: Add two-digit numbers mentally and in short written form when the ones cross 10.
    success_criteria: Solves at least 8 out of 10 bridging addition questions accurately.
  - skill_id: subtract_two_digit_numbers_with_bridging
    subject_id: maths
    area_id: arithmetic
    title: Subtract two-digit numbers with bridging
    recommended_age: 8
    recommended_level: Year 3
    description: Subtract two-digit numbers accurately when regrouping or bridging through a ten is needed.
    success_criteria: Solves at least 8 out of 10 bridging subtraction questions accurately.
  - skill_id: times_tables_through_12
    subject_id: maths
    area_id: arithmetic
    title: Times tables through 12
    recommended_age: 11
    recommended_level: Year 6
    description: Recall multiplication facts through 12 x 12 quickly enough to support written work.
    success_criteria: Answers at least 18 out of 20 mixed table facts correctly in one session.
  - skill_id: multiply_two_digit_by_two_digit
    subject_id: maths
    area_id: arithmetic
    title: Multiply two-digit numbers by two-digit numbers
    recommended_age: 11
    recommended_level: Year 6
    description: Use a secure written method to multiply two-digit numbers and check reasonableness.
    success_criteria: Completes 4 out of 5 written multiplication questions accurately with a sensible check.
  - skill_id: short_division_with_remainders
    subject_id: maths
    area_id: arithmetic
    title: Short division with remainders
    recommended_age: 11
    recommended_level: Year 6
    description: Use short division with one-digit divisors and interpret remainders sensibly.
    success_criteria: Solves 4 out of 5 short-division questions accurately and explains the remainder clearly.
  - skill_id: read_aloud_with_pacing_and_accuracy
    subject_id: english
    area_id: reading
    title: Read aloud with pacing and accuracy
    recommended_age: 8
    recommended_level: Year 3
    description: Read a short passage aloud with steady pacing, clear phrasing, and accurate decoding.
    success_criteria: Reads a short passage aloud with no more than a few prompts and keeps the sense of the text.
  - skill_id: retell_main_events_in_order
    subject_id: english
    area_id: reading
    title: Retell main events in order
    recommended_age: 8
    recommended_level: Year 3
    description: Retell the important parts of a short text in the correct order using clear language.
    success_criteria: Retells the beginning, middle, and end of a short passage without losing the main thread.
  - skill_id: summarise_paragraphs_with_evidence
    subject_id: english
    area_id: reading
    title: Summarise paragraphs with evidence
    recommended_age: 11
    recommended_level: Year 6
    description: Summarise what a paragraph says and support the summary with a direct clue from the text.
    success_criteria: Produces short paragraph summaries that stay accurate and cite at least one supporting detail.
  - skill_id: answer_inference_questions_with_text_clues
    subject_id: english
    area_id: reading
    title: Answer inference questions with text clues
    recommended_age: 11
    recommended_level: Year 6
    description: Use text clues and background reasoning together to answer inference questions responsibly.
    success_criteria: Answers at least 4 out of 5 inference questions with a plausible explanation rooted in the text.
