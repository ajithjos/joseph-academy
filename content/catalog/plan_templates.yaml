          content_ids:
            - cnt_maths_addition_facts_sheet_01
        - day_offset: 2
          title: Subtraction fluency
          capability_ids:
            - subtraction_facts_to_20
          content_ids:
            - cnt_maths_subtraction_facts_sheet_01
        - day_offset: 3
          title: Mixed review
          capability_ids:
            - number_bonds_to_10
            - addition_facts_to_20
            - subtraction_facts_to_20
          content_ids:
            - cnt_maths_number_bonds_sheet_01
            - cnt_maths_addition_facts_sheet_01
            - cnt_maths_subtraction_facts_sheet_01
