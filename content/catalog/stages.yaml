stages:
  - stage_id: mental_arithmetic_fluency_to_100
    subject_id: maths
    area_id: arithmetic
    title: Mental arithmetic fluency to 100
    recommended_age: 8
    recommended_level: Year 3
    description: Fast number relationships and bridging work that prepares a confident younger learner for harder arithmetic.
    skill_ids:
      - number_bonds_to_20
      - add_two_digit_numbers_with_bridging
      - subtract_two_digit_numbers_with_bridging
  - stage_id: written_multiplication_and_division
    subject_id: maths
    area_id: arithmetic
    title: Written multiplication and division
    recommended_age: 11
    recommended_level: Year 6
    description: Secure tables, formal multiplication, and short division for a learner aiming above the usual age expectation.
    skill_ids:
      - times_tables_through_12
      - multiply_two_digit_by_two_digit
      - short_division_with_remainders
  - stage_id: reading_fluency_and_retell
    subject_id: english
    area_id: reading
    title: Reading fluency and retell
    recommended_age: 8
    recommended_level: Year 3
    description: Accurate oral reading and clear retell from short, manageable passages.
    skill_ids:
      - read_aloud_with_pacing_and_accuracy
      - retell_main_events_in_order
  - stage_id: reading_comprehension_with_evidence
    subject_id: english
    area_id: reading
    title: Reading comprehension with evidence
    recommended_age: 11
    recommended_level: Year 6
    description: Read for gist, locate evidence, and answer inference questions without guessing wildly.
    skill_ids:
      - summarise_paragraphs_with_evidence
      - answer_inference_questions_with_text_clues
